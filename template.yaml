name: jupyter-notebook-server
display_name: "Jupyter Notebook Server"
description: "Multi-User JupyterHub-Server für Übungen und Data-Science-Kurse. Vorinstallierte Python-Pakete (pandas, numpy, matplotlib, scikit-learn, seaborn)."
version: "2.0.0"
category: "education"
author: "DHBW CloudStore Team"
icon: jupyter.png

terraform:
  working_dir: terraform/
  required_version: ">= 1.6.0"

tags:
  - jupyter
  - python
  - data-science
  - education
  - multi-user

email_credentials:
  enabled: true

deploy-strategy:
  one-instance: true
  one-per-group: true

ui-groups:
  - id: general
    title: "Allgemein und Nutzer"
    order: 1
  - id: resources
    title: "Ressourcen"
    order: 2
  - id: specific
    title: "Jupyter-Optionen"
    order: 3

parameters:

  general:
    - name: app_name
      type: string
      required: true
      validation:
        pattern: "^[a-z0-9-]{3,20}$"
      description: "Name der Anwendung"
      x-ui:
        group_id: general
        in_group_order: 1
        icon: Server
        placeholder: "z.B. data-science-ws25"
        hint: "Nur Kleinbuchstaben, Zahlen und Bindestriche (3-20 Zeichen)"

    - name: admin_username
      type: string
      required: true
      description: "Dozent (erhält Admin-Rechte in JupyterHub)"
      x-ui:
        group_id: general
        in_group_order: 2
        icon: Users
        placeholder: "Dozent auswählen..."
        widget:
          type: user-picker
          multi: false
          extract: email

    - name: students
      type: array
      required: false
      description: "Studierende (Linux-Accounts und JupyterHub-User auf der VM)"
      x-ui:
        group_id: general
        in_group_order: 3
        icon: Users
        placeholder: "Studierende auswählen..."
        hint: "Alle teilnehmenden Studierenden auswählen. Bei Strategie 'one-instance' teilen sich alle einen JupyterHub. Bei 'one-per-group' wird daraus unten die Gruppen-Auswahl."
        widget:
          type: user-picker
          multi: true
          extract: email

    - name: student_groups
      type: groups
      required: false
      description: "Projektgruppen der Studierenden (nur bei one-per-group)"
      x-ui:
        group_id: general
        in_group_order: 4
        icon: Users
        hint: "Optional: Studierende aus der Auswahl oben in Gruppen einteilen. Bei Strategie 'one-per-group' entsteht pro Gruppe ein eigener JupyterHub. Bei 'one-instance' ignoriert."
        widget:
          type: group-builder
          extract: email

  specific:
    - name: flavor_name
      type: selection
      required: true
      default: "gp1.medium"
      options:
        - label: "Small (1 CPU, 2 GB RAM)"
          value: "gp1.small"
        - label: "Medium (2 CPU, 4 GB RAM) — Empfohlen"
          value: "gp1.medium"
        - label: "Large (4 CPU, 8 GB RAM)"
          value: "gp1.large"
      description: "VM-Größe"
      x-ui:
        group_id: resources
        in_group_order: 1
        icon: Cpu
        hint: "Medium reicht für Übungen mit 5-10 Studierenden. Bei größeren Datensätzen Large wählen."

    - name: notebook_directory
      type: string
      required: false
      default: "exercises"
      validation:
        pattern: "^[a-zA-Z0-9-_]+$"
      description: "Ordnername für Notebooks (im Home-Verzeichnis jedes Nutzers)"
      x-ui:
        group_id: specific
        in_group_order: 1
        placeholder: "exercises"
        hint: "Einfacher Verzeichnisname, keine Pfade."

outputs:
  - name: instance_id
    description: "System ID der Instanz"
    display: false

  - name: app_name
    description: "Projektname"
    display: true

  - name: jupyterhub_url
    description: "JupyterHub Login-URL"
    display: true

  - name: jupyter_version
    description: "Installierte JupyterHub Version"
    display: true

  - name: ssh_command
    description: "SSH Befehl für VM-Zugang"
    display: true

  - name: admin_credentials
    description: "Admin-Zugangsdaten (Dozent)"
    sensitive: true
    display: false

  - name: student_credentials
    description: "Studierenden-Zugangsdaten"
    sensitive: true
    display: false

  - name: ssh_private_key
    description: "SSH Private Key"
    sensitive: true
    display: false
